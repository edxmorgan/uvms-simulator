version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - latexmk
    - texlive-latex-recommended
    - texlive-latex-extra
    - texlive-fonts-recommended

sphinx:
  configuration: doc/conf.py

python:
  install:
    - requirements: doc/requirements-docs.txt

formats:
  - htmlzip
  - pdf
  - epub
